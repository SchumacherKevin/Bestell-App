<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icons/burgericon.png">
    <title>Bestell App</title>

    <link rel="stylesheet" href="style.css">
    <script src="scripts/db.js"></script>
    <script src="scripts/template.js"></script>
    <script src="script.js"></script>
</head>

<body onload="init()">
    <header>
        <nav class="navbar">
            <div class="logo"> <img src="assets/icons/Logo.png" alt="Bestell App logo"></div>
            <ul class="nav_links" id="navLinks">
                <li onclick="toggleMenu()"><a href="#">close</a></li>
                <li onclick="toggleMenu()"><a href="#">close</a></li>
                <li onclick="toggleMenu()"><a href="#">close</a></li>
                <li onclick="toggleMenu()"><a href="#">close</a></li>
            </ul>
            <div class="burger_menu" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>
    <main>
        <section id="hero_section"></section>

        <div id="restaurant_header">
            <img src="assets/icons/burgericon.png" alt="Restaurant Logo">
            <h1>Burger House</h1>
            <p>The best of Burgers, Pizza and Greens all in one place.</p>
        </div>

        <div class="menu_basket_wrapper">
            <div id="menu_box" class="menu"></div>
            <aside id="basket">
                <h3>Basket</h3>
                <div id="basket_items"></div>
                <div id="basket_totals">
                    <hr>
                    <p>Total: $0.00</p>
                </div>
                <button id="buy_now_btn">Buy Now</button>
            </aside>
        </div>
    </main>
    <footer>
        <div id="footer_content">
            <p>copyright</p>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </div>
    </footer>

</body>

</html>
